/* ══ TETRIS ══ */
const COLS=8,ROWS=15;
const TP=[{shape:[[1,1,1,1]],color:”#1a3a8f”},{shape:[[1,1],[1,1]],color:”#c8001e”},{shape:[[0,1,0],[1,1,1]],color:”#7a1a6e”},{shape:[[1,0],[1,0],[1,1]],color:”#1a3a8f”},{shape:[[0,1],[0,1],[1,1]],color:”#c8001e”},{shape:[[1,1,0],[0,1,1]],color:”#7a1a6e”},{shape:[[0,1,1],[1,1,0]],color:”#1a3a8f”}];
function TetrisGame({onExit,onDone}){
const cvs=useRef(null),st=useRef({board:Array(ROWS).fill(null).map(()=>Array(COLS).fill(null)),cur:null,pos:{x:3,y:0},score:0,lines:0,over:false,started:false,tLeft:90,dI:null,tI:null});
const[dp,setDp]=useState({score:0,lines:0,over:false,started:false,tLeft:90});
const np=()=>{const p=TP[Math.floor(Math.random()*TP.length)];return{shape:p.shape.map(r=>[…r]),color:p.color};};
const ok=(b,p,px,py)=>{for(let r=0;r<p.shape.length;r++)for(let c=0;c<p.shape[r].length;c++)if(p.shape[r][c]){const nr=py+r,nc=px+c;if(nr>=ROWS||nc<0||nc>=COLS)return false;if(nr>=0&&b[nr][nc])return false;}return true;};
const place=(b,p,px,py)=>{const nb=b.map(r=>[…r]);p.shape.forEach((row,r)=>row.forEach((cell,c)=>{if(cell){const nr=py+r,nc=px+c;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS)nb[nr][nc]=p.color;}}));return nb;};
const clr=(b)=>{const rem=b.filter(row=>row.some(c=>!c)),cl=ROWS-rem.length;return{nb:[…Array(cl).fill(null).map(()=>Array(COLS).fill(null)),…rem],cl};};
const rot=(p)=>{const rs=p.shape.length,cs=p.shape[0].length,r=Array(cs).fill(null).map(()=>Array(rs).fill(0));p.shape.forEach((row,ri)=>row.forEach((cell,ci)=>{r[ci][rs-1-ri]=cell;}));return{…p,shape:r};};
const draw=useCallback(()=>{
const canvas=cvs.current;if(!canvas)return;
const ctx=canvas.getContext(‘2d’),s=st.current,CW=Math.floor(canvas.width/COLS),CH=Math.floor(canvas.height/ROWS);
ctx.fillStyle=’#faf8f4’;ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.strokeStyle=‘rgba(17,24,39,.05)’;ctx.lineWidth=.5;
for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)ctx.strokeRect(c*CW,r*CH,CW,CH);
s.board.forEach((row,r)=>row.forEach((cell,c)=>{if(cell){ctx.fillStyle=cell;ctx.fillRect(c*CW+1,r*CH+1,CW-2,CH-2);ctx.fillStyle=‘rgba(255,255,255,.25)’;ctx.fillRect(c*CW+2,r*CH+2,CW-4,4);}}));
if(s.cur&&s.started&&!s.over){
let gy=s.pos.y;while(ok(s.board,s.cur,s.pos.x,gy+1))gy++;
s.cur.shape.forEach((row,r)=>row.forEach((cell,c)=>{if(cell){const nr=gy+r,nc=s.pos.x+c;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&!s.board[nr][nc]){ctx.fillStyle=‘rgba(17,24,39,.08)’;ctx.fillRect(nc*CW+1,nr*CH+1,CW-2,CH-2);}}}));
s.cur.shape.forEach((row,r)=>row.forEach((cell,c)=>{if(cell){const nr=s.pos.y+r,nc=s.pos.x+c;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS){ctx.fillStyle=s.cur.color;ctx.fillRect(nc*CW+1,nr*CH+1,CW-2,CH-2);ctx.fillStyle=‘rgba(255,255,255,.3)’;ctx.fillRect(nc*CW+2,nr*CH+2,CW-4,4);}}}));}
},[]);
const spawn=useCallback(()=>{const s=st.current,p=np();if(!ok(s.board,p,3,0)){s.over=true;setDp(d=>({…d,over:true}));return;}s.cur=p;s.pos={x:3,y:0};draw();},[draw]);
const lock=useCallback(()=>{const s=st.current;if(!s.cur)return;s.board=place(s.board,s.cur,s.pos.x,s.pos.y);const{nb,cl}=clr(s.board);s.board=nb;s.score+=cl*100+10;s.lines+=cl;setDp(d=>({…d,score:s.score,lines:s.lines}));spawn();},[spawn]);
const drop=useCallback(()=>{const s=st.current;if(!s.cur||s.over)return;if(ok(s.board,s.cur,s.pos.x,s.pos.y+1)){s.pos={…s.pos,y:s.pos.y+1};draw();}else lock();},[draw,lock]);
const hdrop=useCallback(()=>{const s=st.current;if(!s.cur||s.over)return;let ny=s.pos.y;while(ok(s.board,s.cur,s.pos.x,ny+1))ny++;s.pos={…s.pos,y:ny};lock();},[lock]);
const mleft=useCallback(()=>{const s=st.current;if(!s.cur||s.over)return;if(ok(s.board,s.cur,s.pos.x-1,s.pos.y)){s.pos={…s.pos,x:s.pos.x-1};draw();}},[draw]);
const mright=useCallback(()=>{const s=st.current;if(!s.cur||s.over)return;if(ok(s.board,s.cur,s.pos.x+1,s.pos.y)){s.pos={…s.pos,x:s.pos.x+1};draw();}},[draw]);
const rotate=useCallback(()=>{const s=st.current;if(!s.cur||s.over)return;const r=rot(s.cur),ox=s.pos.x;if(ok(s.board,r,ox,s.pos.y)){s.cur=r;draw();return;}if(ok(s.board,r,ox-1,s.pos.y)){s.cur=r;s.pos={…s.pos,x:ox-1};draw();return;}if(ok(s.board,r,ox+1,s.pos.y)){s.cur=r;s.pos={…s.pos,x:ox+1};draw();}},[draw]);
const start=useCallback(()=>{const s=st.current;s.started=true;s.over=false;s.board=Array(ROWS).fill(null).map(()=>Array(COLS).fill(null));s.score=0;s.lines=0;s.tLeft=90;setDp({score:0,lines:0,over:false,started:true,tLeft:90});spawn();clearInterval(s.dI);s.dI=setInterval(drop,550);clearInterval(s.tI);s.tI=setInterval(()=>{s.tLeft–;setDp(d=>({…d,tLeft:s.tLeft}));if(s.tLeft<=0){clearInterval(s.dI);clearInterval(s.tI);s.over=true;setDp(d=>({…d,over:true}));}},1000);},[spawn,drop]);
useEffect(()=>{
const onKey=e=>{if(e.repeat)return;const s=st.current;if(!s.started||s.over)return;if(e.key===“ArrowLeft”){e.preventDefault();mleft();}else if(e.key===“ArrowRight”){e.preventDefault();mright();}else if(e.key===“ArrowDown”){e.preventDefault();drop();}else if(e.key===“ArrowUp”||e.key===“z”){e.preventDefault();rotate();}else if(e.key===” “){e.preventDefault();hdrop();}};
window.addEventListener(“keydown”,onKey);return()=>window.removeEventListener(“keydown”,onKey);
},[mleft,mright,drop,rotate,hdrop]);
useEffect(()=>()=>{clearInterval(st.current.dI);clearInterval(st.current.tI);},[]);
useEffect(()=>{draw();},[draw]);
const cS=Math.floor((Math.min(340,window.innerWidth-48))/COLS);
const mkB=fn=>e=>{e.preventDefault();fn();};
return(<div style={{background:“var(–cream)”,minHeight:“100vh”,padding:“20px 16px 40px”}}>

<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
<div><div className="t-label" style={{marginBottom:2}}>EFFET TETRIS · OXFORD 2015</div><div className="t-display" style={{fontSize:22,color:"#1a3a8f"}}>Anti-Craving</div></div>
<div style={{textAlign:"right"}}><div className="t-label">Score</div><div className="t-display" style={{fontSize:26,color:"#c8001e"}}>{dp.score}</div></div>
<div style={{textAlign:"right"}}><div className="t-label">Temps</div><div className="t-display" style={{fontSize:26,color:dp.tLeft<20?"#c8001e":"#1a3a8f"}}>{dp.tLeft}s</div></div>
</div>
{!dp.started&&!dp.over&&(<div style={{textAlign:"center",padding:"32px 0"}}><div style={{fontSize:52,marginBottom:12}}>🧩</div><p style={{fontSize:14,color:"var(--ink2)",lineHeight:1.7,marginBottom:8}}>Oxford a prouvé que 3 min de Tetris<br/>réduisent les cravings de 24%.</p><p style={{fontSize:12,color:"#1a3a8f",marginBottom:32,fontStyle:"italic"}}>Ton hippocampe va être très occupé.</p><button onClick={start} className="btn-primary" style={{maxWidth:280,margin:"0 auto",display:"block"}}>Lancer le jeu</button></div>)}
{dp.over&&(<div style={{textAlign:"center",padding:"32px 0"}}><div className="t-display" style={{fontSize:36,color:"#1a3a8f",marginBottom:8}}>{dp.tLeft<=0?"Temps écoulé !":"Game Over"}</div><div style={{fontSize:13,color:"var(--ink3)",marginBottom:8}}>Score : {dp.score} · Lignes : {dp.lines}</div><p style={{fontSize:13,color:"var(--ink2)",lineHeight:1.7,marginBottom:24,fontStyle:"italic"}}>Ton hippocampe était trop occupé pour alimenter le craving.</p><button onClick={()=>onDone(dp.score)} className="btn-primary" style={{marginBottom:10}}>Continuer →</button><button onClick={start} className="btn-outline" style={{marginBottom:10}}>Rejouer</button><button onClick={onExit} className="btn-ghost">Quitter</button></div>)}
{dp.started&&!dp.over&&(<><div style={{margin:"0 auto 16px",width:"fit-content",border:"1.5px solid var(--border)",borderRadius:6,padding:2,background:"#faf8f4",boxShadow:"0 2px 8px var(--shadow)"}}><canvas ref={cvs} width={COLS*cS} height={ROWS*cS} style={{display:"block",borderRadius:4}}/></div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginBottom:10}}>
{[["←",mleft],["↻",rotate],["→",mright],["⬇",hdrop]].map(([l,fn])=>(<button key={l} className="t-btn" onPointerDown={mkB(fn)}>{l}</button>))}
</div>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{color:"var(--ink3)",fontSize:11}}>Lignes : {dp.lines}</span><button onClick={onExit} style={{background:"none",border:"none",color:"var(--ink3)",fontSize:12,cursor:"pointer"}}>✕ Quitter</button></div></>)}
</div>);}

function CircleGame({onExit,onDone}){

[phase,setPhase]=useState(“intro”),[scores,setScores]=useState([]),[cur,setCur]=useState(null),[round,setRound]=useState(1);

function TherapyScreen({data,onSaveResult,onBack}){

const sessions=data.sessions||[],qH=sessions.filter(s=>s.type===“q”),exC=sessions.filter(s=>s.type===“ex”).length;
const nowT=Date.now();

<span style={{color:q.color,fontSize:16}}>→</span></button>);})}

<h2 className="t-display" style={{fontSize:28,marginBottom:20}}>Aujourd'hui,<br/>c'est comment ?</h2>
<div style={{textAlign:"center",marginBottom:24}}>
<span className="t-display" style={{fontSize:72,color:craving>7?"#c8001e":craving>4?"#b05800":"#1a3a8f"}}>{craving}</span>
<div className="t-label" style={{marginTop:8}}>/10</div></div>
<input type="range" min="0" max="10" value={craving} onChange={e=>setCraving(+e.target.value)} style={{marginBottom:8}}/>
<div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--ink3)"}}><span>Tranquille</span><span>Feu aux fesses</span></div></div>
<button onClick={()=>onDone({name,region,craving})} className="btn-crisis">C'est parti →</button></>)}
</div>);}

/* ══ APP ══ */
const QUOTES_T=[“Ton cerveau panique. Parfait. On va le doubler.”,“Une rechute, c’est une donnée. Pas un verdict.”,“Le craving dure 15 min. T’as une montre ?”,“Dopamine naturelle : sans l’addition.”,“Ton nerf vague attend ton appel.”,“Tetris coupe les cravings. Oxford l’a prouvé.”,“Tu n’es pas ton craving. T’es celui qui l’observe.”];
function App(){
const[data,setData]=useState(()=>ld()||{sessions:[],score:7,user:null});
const[screen,setScreen]=useState(()=>ld()?.user?“main”:“onboarding”);
const[view,setView]=useState(“home”);
const[activeEx,setActiveEx]=useState(null);
const[game,setGame]=useState(null);
const[craving,setCraving]=useState(()=>ld()?.user?.craving||4);
const cravTimer=useRef(null);
const quote=QUOTES_T[Math.floor(Math.random()*QUOTES_T.length)];
const region=data.user?.region||“BE”;

const upd=u=>{const nd={…data,…u};setData(nd);sv(nd);};
const addSession=s=>{setData(prev=>{const ss=[…(prev.sessions||[]),{…s,date:Date.now()}];const nd={…prev,sessions:ss};sv(nd);return nd;});};
const goHome=()=>{setView(“home”);setActiveEx(null);setGame(null);};

const handleCrav=val=>{
setCraving(val);
if(cravTimer.current)clearTimeout(cravTimer.current);
cravTimer.current=setTimeout(()=>{setData(prev=>{const ss=[…(prev.sessions||[]),{type:“craving_log”,value:val,date:Date.now()}];const nd={…prev,sessions:ss};sv(nd);return nd;});},2500);
};

if(screen===“onboarding”)return<Onboarding onDone={u=>{upd({user:u});setCraving(u.craving);setScreen(“main”);}}/>;
if(game===“tetris”)return<TetrisGame onExit={goHome} onDone={sc=>{addSession({type:“ex”,name:“Tetris”,score:sc});upd({score:(data.score||0)+3});goHome();}}/>;
if(game===“circle”)return<CircleGame onExit={goHome} onDone={sc=>{addSession({type:“ex”,name:“Cercle”,score:sc});upd({score:(data.score||0)+2});goHome();}}/>;
if(game===“breathing”)return<BreathingGame onExit={goHome} onDone={()=>{addSession({type:“ex”,name:“Breathing”});upd({score:(data.score||0)+2});goHome();}}/>;
if(view===“exDetail”&&activeEx)return<ExerciseScreen ex={activeEx} onBack={()=>setView(“exercises”)} onDone={pts=>{addSession({type:“ex”,name:activeEx.name});upd({score:(data.score||0)+pts});goHome();}}/>;
if(view===“exercises”)return<ExercisesScreen onBack={goHome} onSelect={ex=>{setActiveEx(ex);setView(“exDetail”);}}/>;
if(view===“therapy”)return<TherapyScreen data={data} onBack={goHome} onSaveResult={r=>addSession(r)}/>;
if(view===“rdr”)return<RDRScreen onBack={goHome} region={region}/>;
if(view===“substances”)return<SubstancesScreen onBack={()=>setView(“dossiers”)}/>;
if(view===“cannabinoids”)return<CannabScreen onBack={()=>setView(“dossiers”)}/>;
if(view===“rc”)return<RCScreen onBack={()=>setView(“dossiers”)}/>;
if(view===“darkweb”)return<DarkwebScreen onBack={()=>setView(“dossiers”)}/>;
if(view===“dossiers”)return<DossiersHub onBack={goHome} setView={setView}/>;

const sessions=data.sessions||[],nowA=Date.now();
const streak=(()=>{const days=new Set(sessions.filter(s=>s.date&&nowA-s.date<7*86400000&&s.type!==“craving_log”).map(s=>new Date(s.date).toDateString()));return Math.min(days.size,7);})();
const score=data.score||0;

return(<div style={{background:“var(–cream)”,minHeight:“100vh”}}>

<div style={{padding:"24px 20px 100px",animation:"fadeUp .3s ease"}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
<div><div className="t-label" style={{marginBottom:4}}>Cockpit · {REGIONS[region]?.label||"🌍"}</div>
<h1 className="t-display" style={{fontSize:34,lineHeight:1}}>Bonjour,<br/><span style={{color:"#c8001e"}}>{data.user?.name}.</span></h1></div>
<div style={{background:"#fff",border:"1.5px solid var(--border)",borderRadius:8,padding:"10px 14px",textAlign:"center",boxShadow:"0 2px 8px var(--shadow)"}}>
<div className="t-label" style={{marginBottom:2}}>Karma</div>
<div className="t-display" style={{fontSize:26,color:"#1a3a8f"}}>{score}</div></div></div>
<div className="ticker-wrap"><div className="ticker-inner">{[...QUOTES,...QUOTES].map((q,i)=><span key={i} className="ticker-item">// {q}</span>)}</div></div>
<div className="card" style={{borderColor:"rgba(200,0,30,.15)",marginBottom:16}}>
<div className="t-label" style={{marginBottom:8}}>Signal du jour</div>
<p style={{fontStyle:"italic",lineHeight:1.7,fontSize:14,color:"var(--ink)"}}>{quote}</p></div>
<div className="card" style={{marginBottom:16}}>
<div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
<span style={{fontSize:13,fontWeight:600,color:"var(--ink)"}}>Craving maintenant</span>
<span className="t-display" style={{fontSize:26,color:craving>7?"#c8001e":craving>4?"#b05800":"#1a3a8f"}}>{craving}/10</span></div>
<input type="range" min="0" max="10" value={craving} onChange={e=>handleCrav(+e.target.value)}/>
<div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:10,color:"var(--ink3)"}}><span>Tranquille</span><span>Feu aux fesses</span></div></div>
<button onClick={()=>craving>5?setGame("tetris"):setGame("breathing")} className="btn-crisis" style={{marginBottom:16}}>J'ai un craving →</button>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:20}}>
{[{e:"🔥",v:streak,s:"série"},{e:"💪",v:sessions.filter(s=>s.type==="ex").length,s:"exercices"},{e:"📋",v:sessions.filter(s=>s.type==="q").length,s:"bilans"}].map(k=>(
<div key={k.s} className="card-blue" style={{textAlign:"center",padding:"12px 6px"}}>
<div style={{fontSize:20,marginBottom:2}}>{k.e}</div>
<div className="t-display" style={{fontSize:22,color:"#c8001e"}}>{k.v}</div>
<div className="t-label" style={{marginTop:2,fontSize:9}}>{k.s}</div></div>))}
</div>
<div className="t-label" style={{marginBottom:10}}>Jeux interactifs</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:20}}>
{[{id:"tetris",e:"🧩",n:"Tetris",s:"Anti-Craving",c:"#1a3a8f"},{id:"circle",e:"⭕",n:"Cercle",s:"Contrôle moteur",c:"#7a1a6e"},{id:"breathing",e:"💨",n:"Souffle",s:"Nerf vague",c:"#c8001e"}].map(g=>(
<button key={g.id} onClick={()=>setGame(g.id)} style={{background:"#fff",border:`1.5px solid ${g.c}30`,borderRadius:8,padding:"14px 10px",cursor:"pointer",textAlign:"left",boxShadow:"0 1px 6px var(--shadow)"}}>
<div style={{fontSize:24,marginBottom:6}}>{g.e}</div>
<div className="t-display" style={{fontSize:13,color:g.c,marginBottom:2}}>{g.n}</div>
<div style={{fontSize:10,color:"var(--ink3)"}}>{g.s}</div></button>))}
</div>
<div className="t-label" style={{marginBottom:10}}>Modules</div>
{[{l:"Exercices & Plasticité",sub:EXERCISES.length+" protocoles neuroscience",c:"#1a3a8f",action:()=>setView("exercises"),e:"🧠"},
{l:"Dossier Thérapeutique",sub:"Questionnaires · Courbes · Historique",c:"#c8001e",action:()=>setView("therapy"),e:"📋"},
{l:"Dossiers Substances",sub:"Substances · Cannabinoïdes · RC · Darkweb",c:"#7a1a6e",action:()=>setView("dossiers"),e:"🔬"},
{l:"RDR "+( REGIONS[region]?.label||"Régional"),sub:"Urgences · Centres · Groupes",c:"#1a3a8f",action:()=>setView("rdr"),e:"🛡"},
].map(m=>(<button key={m.l} onClick={m.action} style={{width:"100%",background:"#fff",border:"1.5px solid var(--border)",borderRadius:8,padding:14,cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,boxShadow:"0 1px 6px var(--shadow)"}}>
<div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:22}}>{m.e}</span><div><div className="t-display" style={{fontSize:15,color:m.c,marginBottom:2}}>{m.l}</div><div style={{fontSize:11,color:"var(--ink3)"}}>{m.sub}</div></div></div>
<span style={{color:m.c,fontSize:16,flexShrink:0}}>→</span></button>))}
<div style={{marginTop:32,textAlign:"center"}}><button onClick={()=>{if(window.confirm("Effacer toutes les données ?")){localStorage.removeItem(KEY);window.location.reload();}}} style={{background:"none",border:"none",color:"var(--border2)",fontSize:10,cursor:"pointer"}}>Réinitialiser les données</button></div>
</div>
<nav className="nav-bar">
{[{id:"home",i:"⚡",l:"Cockpit",a:goHome},{id:"exercises",i:"🧠",l:"Exercices",a:()=>setView("exercises")},{id:"crisis",i:"🆘",l:"Crise",a:()=>craving>5?setGame("tetris"):setGame("breathing"),red:true},{id:"therapy",i:"📋",l:"Dossier",a:()=>setView("therapy")},{id:"rdr",i:"🛡",l:"RDR",a:()=>setView("rdr")}].map(t=>(
<button key={t.id} className={`nav-item${view===t.id?" active":""}`} onClick={t.a} style={{color:t.red?"#c8001e":view===t.id?"#1a3a8f":"var(--ink3)",opacity:t.red?1:view===t.id?1:.5,cursor:"pointer"}}>
<span className="ni">{t.i}</span><span>{t.l}</span></button>))}
</nav>
</div>);}

ReactDOM.createRoot(document.getElementById(“app”)).render(<App/>);
</script>

</body>
</html>
